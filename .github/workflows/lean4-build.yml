name: Lean 4 Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (with SHA-256 integrity verification)
        # Delegate to the canonical setup script so the elan installer's
        # SHA-256 pin lives in exactly one place
        # (`scripts/setup_lean_env.sh`). The script fetches the installer
        # from a commit-pinned URL, verifies its hash, and fails fast if
        # the upstream blob ever rotates — addressing audit finding F-22.
        run: |
          ./scripts/setup_lean_env.sh --quiet
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan/toolchains
            .lake
          key: mathlib-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: mathlib-

      - name: Fetch Mathlib cache
        run: lake exe cache get || true

      - name: Build
        run: lake build Orbcrypt

      - name: Verify no sorry
        # Match `sorry` only when used as an identifier (both boundaries are
        # non-identifier characters). Incidental mentions inside docstrings
        # or comments (e.g. a proof-strategy note) are filtered out so they
        # do not turn CI red. Hardened per audit finding F-03.
        run: |
          set -e
          matches="$(grep -Prn '(^|[^A-Za-z0-9_])sorry([^A-Za-z0-9_]|$)' \
            Orbcrypt/ --include='*.lean' || true)"
          # Strip lines where the match occurs inside a comment: either a
          # line comment (`--`) or a single-line block comment containing
          # the word `sorry`. Multi-line docstrings that legitimately use
          # the word would need to be handled by convention; none exist
          # today.
          filtered="$(printf '%s\n' "$matches" \
            | grep -v -E '^[^:]*:[0-9]+:[[:space:]]*--' \
            | grep -v -E '^[^:]*:[0-9]+:[[:space:]]*/-.*sorry.*-/' \
            || true)"
          if [ -n "$filtered" ]; then
            echo "ERROR: sorry found in source files"
            echo "$filtered"
            exit 1
          fi

      - name: Verify no unexpected axioms
        run: |
          # Lean axiom declarations have the form: axiom <identifier> [params] : <type>
          # Use -P (Perl regex) to match declarations (identifier followed by type annotation)
          # This avoids false positives from "axiom" appearing in docstrings
          if grep -Prn "^axiom\s+\w+\s*[\[({:]" Orbcrypt/ --include="*.lean"; then
            echo "ERROR: unexpected axiom declaration found in source files"
            exit 1
          fi
