name: Lean 4 Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (with SHA-256 integrity verification)
        # Delegate to the canonical setup script so the elan installer's
        # SHA-256 pin lives in exactly one place
        # (`scripts/setup_lean_env.sh`). The script fetches the installer
        # from a commit-pinned URL, verifies its hash, and fails fast if
        # the upstream blob ever rotates — addressing audit finding F-22.
        run: |
          ./scripts/setup_lean_env.sh --quiet
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan/toolchains
            .lake
          key: mathlib-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: mathlib-

      - name: Fetch Mathlib cache
        run: lake exe cache get || true

      - name: Build
        run: lake build Orbcrypt

      - name: Verify no sorry
        # Audit finding F-03: previously the check was `grep -rn "sorry" ...`,
        # which would red-card CI if any docstring, module header, or proof
        # comment ever mentioned the word `sorry`. The hardened check below
        # is *comment-aware*: it strips all block comments (`/- … -/`,
        # including docstrings `/-- … -/` and module docstrings `/-! … -/`,
        # **and arbitrarily nested `/- ... /- inner -/ ... -/` blocks**)
        # and all line comments (`-- …`) from each `.lean` file using a
        # Perl slurp, and only then searches the remaining source for
        # `sorry` with identifier word-boundaries on both sides.
        #
        # This accepts only genuine uses of the `sorry` tactic or term
        # (what we actually want to ban); it never flags English prose in
        # comments or docstrings. Multi-line docstrings are handled
        # correctly because the Perl strip is file-wide (`-0777`), not
        # line-wide.
        #
        # Implementation note (Workstream C / C3 of audit 2026-04-29):
        # the strip pattern below is a Perl **recursive** regex that
        # matches `/- ... -/` blocks with arbitrary nesting depth. The
        # pre-C3 non-greedy `/-.*?-/` pattern stripped the *innermost*
        # delimiter pair on every match, which on a fragment of the form
        #
        #     /- a /- b -/ sorry /- c -/ -/
        #
        # produced two non-greedy strips (`/- a /- b -/` and `/- c -/`)
        # leaving a literal ` sorry  -/` trailer with the keyword
        # exposed — even though the entire fragment was inside the
        # outermost block comment in the original Lean source. The C3
        # recursive pattern below correctly recognises the outermost
        # `/- ... -/` span and strips the entire nested block atomically.
        #
        # Pattern anatomy:
        #   `(\/\-(?:[^\/\-]++|\-(?!\/)|\/(?!\-)|(?1))*+\-\/)`
        # captures the outermost block as group 1, then matches its body
        # as a sequence of: any non-`/`-non-`-` character (possessive
        # `++` to avoid catastrophic backtracking on long bodies), or a
        # `-` not followed by `/`, or a `/` not followed by `-`, or a
        # recursive `(?1)` reference matching another nested block.
        # Possessive `*+` on the body's outer alternation eliminates
        # backtracking once a body character has been consumed, keeping
        # complexity O(n) on well-formed input.
        #
        # See `docs/dev_history/AUDIT_2026-04-29_COMPREHENSIVE_WORKSTREAM_PLAN.md`
        # § 7.3 (Workstream C / C3) for the audit context. The C3
        # recursive regex landed alongside C1, C2, C4, C5 of the same
        # plan as a defense-in-depth upgrade. The build step above
        # remains the definitive `sorry` guard via Lean's own parser;
        # this check is a fast pre-filter, not a security boundary.
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            # Workstream C / C3: recursive comment-strip using Perl's
            # `(?1)` self-reference to handle arbitrarily-nested Lean
            # block comments.
            hits="$(perl -0777 -pe 's{(\/\-(?:[^\/\-]++|\-(?!\/)|\/(?!\-)|(?1))*+\-\/)}{}sg; s{--[^\n]*}{}g' "$f" \
              | grep -Pn '(^|[^A-Za-z0-9_])sorry([^A-Za-z0-9_]|$)' || true)"
            if [ -n "$hits" ]; then
              echo "ERROR: sorry found in $f (outside comments and docstrings):"
              printf '%s\n' "$hits" | sed 's/^/  /'
              fail=1
            fi
          done < <(find Orbcrypt -name '*.lean' -print0)
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

      - name: Verify no unexpected axioms
        run: |
          # Lean axiom declarations have the form: axiom <identifier> [params] : <type>
          # Use -P (Perl regex) to match declarations (identifier followed by type annotation)
          # This avoids false positives from "axiom" appearing in docstrings
          if grep -Prn "^axiom\s+\w+\s*[\[({:]" Orbcrypt/ --include="*.lean"; then
            echo "ERROR: unexpected axiom declaration found in source files"
            exit 1
          fi

      - name: Verify lake-manifest.json drift
        # Workstream C of audit 2026-04-29 (finding A-08 / C4): cross-check
        # that every direct `require ... @ git "<rev>"` directive in
        # `lakefile.lean` matches the corresponding `rev` field in
        # `lake-manifest.json`. The manifest is a critical reproducibility
        # surface — if a developer bumps Mathlib's pin in `lakefile.lean`
        # without re-running `lake update`, the manifest's recorded rev
        # falls out of sync, but downstream `lake build` may still
        # succeed using the cached olean tree, producing a build whose
        # apparent dependencies don't match the documented ones. CI must
        # detect this discrepancy.
        #
        # The audit-plan C4 skeleton suggested `lake update --dry-run`,
        # but Lake at v4.30.0-rc1 has no `--dry-run` flag (`lake update
        # --help` documents only the bare invocation, which mutates the
        # manifest). The structural cross-check below is exact: it
        # compares the two files directly without invoking Lake.
        #
        # Direct requires only. Transitive dependencies (Mathlib's own
        # `require`s, marked `"inherited": true` in the manifest) are
        # not re-pinned in this lakefile, so they are not checked here —
        # their pins are managed by Mathlib's lakefile and propagate via
        # `lake update` when the Mathlib rev changes. The check below
        # is concerned only with this package's *own* declared pins.
        run: |
          set -e
          # Audit-pass refinement (post-Workstream-C, 2026-04-30): explicit
          # checks for "manifest file missing" and "manifest JSON malformed"
          # are split out from the "package missing from manifest" case so
          # the error message points the user at the actual remediation.
          if [ ! -f lake-manifest.json ]; then
            echo "ERROR: lake-manifest.json missing from workspace root"
            echo "  (the C4 drift check requires it; run \`lake update\` to generate)"
            exit 1
          fi
          # Validate JSON shape up front — `python3 -m json.tool` exits
          # non-zero on malformed JSON.
          if ! python3 -m json.tool lake-manifest.json > /dev/null 2>&1; then
            echo "ERROR: lake-manifest.json is not valid JSON"
            echo "  (re-generate with \`lake update\`)"
            exit 1
          fi
          # Extract every direct `require ... @ git "<rev>"` from lakefile.lean.
          # The format is one require-directive per line:
          #   `require "leanprover-community" / "mathlib" @ git "<40-hex>"`
          # We capture the `name` (last path-segment of the package spec)
          # and the `rev` (the 40-hex git-revision literal).
          mapfile -t requires < <(perl -ne '
            if (/^\s*require\s+"[^"]+"\s*\/\s*"([^"]+)"\s*@\s*git\s+"([a-f0-9]{40})"/) {
              print "$1 $2\n";
            }
          ' lakefile.lean)
          if [ "${#requires[@]}" -eq 0 ]; then
            echo "ERROR: no direct git-pinned requires found in lakefile.lean"
            echo "  (the C4 drift check expects at least one)"
            exit 1
          fi
          fail=0
          for entry in "${requires[@]}"; do
            name="${entry%% *}"
            lakefile_rev="${entry#* }"
            # Look up the package's manifest rev. Use python3 (always
            # present on ubuntu-latest CI runners) to avoid a jq
            # dependency. JSON validity has already been verified above,
            # so any error at this point indicates a missing entry —
            # not a parser failure.
            #
            # Audit-pass note (post-Workstream-C, 2026-04-30): the
            # python invocation is a *single line* (semicolon-
            # separated) rather than a multi-line script because the
            # YAML literal-block scalar (`run: |`) requires all
            # content lines to be indented at least to the first
            # content line's indentation. Multi-line python at column
            # 0 would dedent below that level and prematurely
            # terminate the literal block, breaking workflow parsing.
            manifest_rev="$(python3 -c "import json,sys; data=json.load(open('lake-manifest.json')); print(next((p['rev'] for p in data.get('packages', []) if p.get('name') == sys.argv[1]), ''))" "$name" 2>&1 || echo "")"
            if [ -z "${manifest_rev}" ]; then
              echo "ERROR: lakefile.lean requires '${name}', but no entry in lake-manifest.json"
              echo "  (run \`lake update ${name}\` to add it to the manifest)"
              fail=1
              continue
            fi
            if [ "${manifest_rev}" != "${lakefile_rev}" ]; then
              echo "ERROR: lake-manifest.json drift detected for ${name}:"
              echo "  lakefile.lean pin:  ${lakefile_rev}"
              echo "  manifest rev:       ${manifest_rev}"
              echo "  (run \`lake update ${name}\` to re-sync the manifest)"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "lake-manifest.json drift check passed (${#requires[@]} direct require(s) verified)"

      - name: Verify hypothesis consumption (theatrical-theorem gate)
        # Workstream 2 of structural review 2026-05-06 (plan
        # `docs/dev_history/AUDIT_2026-05-06_STRUCTURAL_REVIEW.md`):
        # pre-merge gate that catches the "theatrical theorem" pattern —
        # a theorem with a non-underscored hypothesis name that the
        # proof body never references (and that doesn't appear in the
        # conclusion type or in any subsequent binder's type either).
        #
        # The pattern has recurred across post-landing audits (R-TI
        # Phase 3 v1, Workstream I v1, Stage-3/Stage-5 identity-case
        # witnesses, the audit-2 cleanup of post-Path-B Discharge.lean,
        # the audit-pass-v2 of the Manin chain). Each recurrence has
        # been caught only by a deep-audit pass *after* landing; this
        # gate fronts-loads the work and prevents regression.
        #
        # The gate is implemented in Python (`scripts/audit_hypothesis_
        # consumption.py`) rather than Lean to avoid toolchain
        # dependency for a pre-merge check. It uses regex parsing with
        # tactic-whitelist short-circuits and an ALLOW_LIST for known
        # release-facing signature markers. See the script's module
        # docstring for full detection semantics.
        run: |
          set -e
          python3 scripts/audit_hypothesis_consumption.py

      - name: Phase 16 axiom-transparency audit
        # Run the consolidated Phase 16 audit script:
        # `#print axioms` over every headline result in Phases 1–14, plus
        # non-vacuity witnesses for KEM correctness, hybrid correctness,
        # AEAD correctness, INT_CTXT, and the probabilistic ε-bound
        # reductions. The script type-checks against the production build
        # (no `sorry`, no custom axioms). CI fails if:
        #  - any axiom-print output mentions `sorryAx` (a hidden `sorry`
        #    in the dependency chain), or
        #  - any axiom-print output references an axiom outside the
        #    standard Lean trio (`propext`, `Classical.choice`,
        #    `Quot.sound`).
        # See `docs/VERIFICATION_REPORT.md` for the prose summary and
        # `scripts/audit_phase_16.lean` for the script itself.
        run: |
          set -e
          out="$(lake env lean scripts/audit_phase_16.lean 2>&1)"
          echo "$out"
          # Fail fast on `sorryAx` anywhere in the script's output.
          if printf '%s\n' "$out" | grep -Fq sorryAx; then
            echo "ERROR: sorryAx detected by Phase 16 audit script"
            exit 1
          fi
          # Lean wraps long axiom lists across multiple lines, e.g.
          #   'Orbcrypt.X' depends on axioms: [propext,
          #    Classical.choice,
          #    Quot.sound]
          # A naive line-oriented scan would only see `[propext,` on the
          # first line and miss a custom axiom hiding on lines 2–3. We
          # therefore *de-wrap* the output first — collapse
          # `,<newline><whitespace>` into `, ` — so every
          # `depends on axioms: [...]` entry occupies a single logical line
          # before we parse it.
          dewrapped="$(printf '%s\n' "$out" | perl -0777 -pe 's/,\n\s+/, /g')"
          # Walk the (now one-line) axiom-print entries and reject any
          # axiom outside the standard Lean trio.
          fail=0
          while IFS= read -r line; do
            # Strip everything up to and including the colon-space header.
            axioms_part="${line#*depends on axioms: }"
            # Tokenise: drop leading `[`, trailing `]`, and split on commas.
            axioms_part="${axioms_part#[}"
            axioms_part="${axioms_part%]}"
            IFS=',' read -ra tokens <<< "$axioms_part"
            for tok in "${tokens[@]}"; do
              # Trim whitespace.
              tok="$(echo "$tok" | tr -d '[:space:]')"
              case "$tok" in
                propext|Classical.choice|Quot.sound|"") : ;;
                *) echo "ERROR: unexpected axiom: $tok in line: $line"; fail=1 ;;
              esac
            done
          done < <(printf '%s\n' "$dewrapped" | grep -E "depends on axioms")
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
